spring.application.name=operations-hub

# Local/dev DB (H2) to avoid MySQL credential issues during startup.
spring.datasource.url=jdbc:h2:file:./.data/operations-hub;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Seed default buildings/floors so dropdowns are populated in local/dev.
app.seed.enabled=true
